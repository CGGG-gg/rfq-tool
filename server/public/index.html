<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>图片转RFQ</title>
<style>
:root{--blue:#1989fa;--green:#07c160;--gray:#999;--bg:#f5f5f5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#fff;color:#333;font-size:14px;min-height:100vh}
.container{max-width:420px;margin:0 auto;padding:16px}
h1{font-size:20px;text-align:center;padding:20px 0;color:#333}
.step{font-size:13px;color:var(--gray);text-align:center;margin-bottom:12px}
.upload-zone{border:2px dashed #ddd;border-radius:12px;padding:60px 20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:16px}
.upload-zone:hover,.upload-zone.drag{border-color:var(--blue);background:#f0f7ff}
.upload-zone .icon{font-size:48px;display:block;margin-bottom:12px}
.upload-zone .hint{color:var(--gray);font-size:13px;margin-top:8px}
.preview-img{width:100%;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1);margin-bottom:16px}
.status{text-align:center;padding:20px;color:var(--gray)}
.status .spinner{display:inline-block;width:24px;height:24px;border:3px solid #e0e0e0;border-top:3px solid var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{background:#f9fafb;border-radius:10px;padding:16px;margin-bottom:12px}
.result-card .name{font-size:15px;font-weight:600}
.result-card .row{display:flex;gap:16px;margin-top:6px;font-size:13px;color:#666}
.result-card input{flex:1;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:13px;margin-top:6px}
.btn{display:block;width:100%;border:none;border-radius:8px;padding:14px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:10px}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:active{opacity:.8}
.btn-green{background:var(--green);color:#fff}.btn-green:active{opacity:.8}
.btn-white{background:#fff;color:var(--blue);border:1px solid var(--blue)}
.btn:disabled{opacity:.5;pointer-events:none}
.source-tag{font-size:11px;color:var(--gray);text-align:center;margin:8px 0}
.error{color:#ee0a24;text-align:center;padding:10px;font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="container">
  <h1>📷 图片转 RFQ</h1>
  <p class="step">上传产品规格图片 → AI 自动识别提取 → 生成询价单</p>

  <!-- Step 1: Upload -->
  <div id="upload-area">
    <label class="upload-zone" for="file-input">
      <span class="icon">📷</span>
      <strong>点击选择图片</strong>
      <div class="hint">支持 JPG / PNG / WebP，最大 10MB</div>
    </label>
    <input type="file" id="file-input" accept="image/*" style="display:none">
  </div>

  <div id="preview-area" class="hidden"></div>

  <!-- Step 2: Loading -->
  <div id="loading-area" class="status hidden">
    <div class="spinner"></div>
    <div>AI 正在分析图片...</div>
    <div style="font-size:12px;color:var(--gray);margin-top:4px">DeepSeek + Kimi 并行识别</div>
  </div>

  <!-- Step 3: Result -->
  <div id="result-area" class="hidden">
    <div style="font-size:15px;font-weight:600;margin-bottom:12px">识别结果（可修改）</div>
    <div id="items-list"></div>
    <div class="source-tag" id="source-info"></div>
    <button class="btn btn-blue" onclick="downloadExcel()">📥 下载 Excel</button>
    <button class="btn btn-white" onclick="downloadPDF()">📥 下载 PDF</button>
    <button class="btn btn-white" onclick="resetAll()">🔄 重新上传</button>
  </div>

  <!-- Error -->
  <div id="error-area" class="error hidden"></div>
</div>

<script>
let currentRfqId = null;
let currentItems = [];

const fileInput = document.getElementById('file-input');
fileInput.addEventListener('change', handleFile);

const uploadZone = document.querySelector('.upload-zone');
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file) processImage(file);
});

function handleFile(e) {
  const file = e.target.files[0];
  if (file) processImage(file);
}

async function processImage(file) {
  const up = document.getElementById('upload-area');
  const preview = document.getElementById('preview-area');
  const loading = document.getElementById('loading-area');
  const result = document.getElementById('result-area');
  const error = document.getElementById('error-area');

  up.classList.add('hidden');
  error.classList.add('hidden');
  result.classList.add('hidden');

  // Preview
  preview.innerHTML = `<img src="${URL.createObjectURL(file)}" class="preview-img">`;
  preview.classList.remove('hidden');
  loading.classList.remove('hidden');

  try {
    // 1) Upload image to server
    const fd = new FormData();
    fd.append('images', file);
    const uploadRes = await fetch('/api/v1/uploads', { method:'POST', body:fd }).then(r=>r.json());
    if (!uploadRes.success) throw new Error(uploadRes.error);

    // 2) Create a temporary RFQ
    const rfqRes = await fetch('/api/v1/rfqs', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ title: file.name, notes: 'AI 识别结果' })
    }).then(r=>r.json());
    if (!rfqRes.success) throw new Error(rfqRes.error);
    currentRfqId = rfqRes.data.id;

    // 3) Associate image with RFQ
    const fd2 = new FormData();
    fd2.append('images', file);
    await fetch('/api/v1/rfqs/'+currentRfqId+'/images', { method:'POST', body:fd2 });

    // 4) Recognize
    const recRes = await fetch('/api/v1/rfqs/'+currentRfqId+'/recognize', { method:'POST' }).then(r=>r.json());
    if (!recRes.success || !recRes.data.items.length) {
      throw new Error('未能从图片中识别到产品信息，请尝试更清晰的图片');
    }

    currentItems = recRes.data.items;

    // 5) Show results
    loading.classList.add('hidden');
    preview.classList.add('hidden');
    renderItems(currentItems);
    document.getElementById('source-info').textContent = '识别引擎: ' + (recRes.data.source || 'AI');
    result.classList.remove('hidden');

  } catch (e) {
    loading.classList.add('hidden');
    preview.classList.add('hidden');
    error.textContent = '❌ ' + e.message;
    error.classList.remove('hidden');
    document.getElementById('upload-area').classList.remove('hidden');
  }
}

function renderItems(items) {
  const list = document.getElementById('items-list');
  list.innerHTML = items.map((item, i) => `
    <div class="result-card">
      <input value="${esc(item.product_name)}" placeholder="产品名称" onchange="updateItem(${i},'product_name',this.value)">
      <div class="row">
        <input value="${item.quantity}" type="number" placeholder="数量" style="width:80px" onchange="updateItem(${i},'quantity',this.value)">
        <input value="${item.unit}" placeholder="单位" style="width:60px" onchange="updateItem(${i},'unit',this.value)">
        <input value="${item.target_price||''}" type="number" placeholder="单价" style="flex:1" onchange="updateItem(${i},'target_price',this.value)">
      </div>
      <input value="${esc(item.specification||'')}" placeholder="规格型号（可选）" onchange="updateItem(${i},'specification',this.value)">
    </div>
  `).join('');
}

function updateItem(index, field, value) {
  currentItems[index][field] = value;
}

async function downloadExcel() {
  await saveItems();
  window.open('/api/v1/rfqs/'+currentRfqId+'/export/excel');
}

async function downloadPDF() {
  await saveItems();
  window.open('/api/v1/rfqs/'+currentRfqId+'/export/pdf');
}

async function saveItems() {
  if (!currentRfqId || !currentItems.length) return;
  await fetch('/api/v1/rfqs/'+currentRfqId+'/items/bulk', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ items: currentItems.map(i => ({
      product_name: i.product_name, specification: i.specification||'',
      quantity: parseFloat(i.quantity)||1, unit: i.unit||'个',
      target_price: i.target_price?parseFloat(i.target_price):null,
      delivery_date: i.delivery_date||null, remarks: i.remarks||''
    })) })
  });
}

function resetAll() {
  currentRfqId = null; currentItems = [];
  document.getElementById('preview-area').classList.add('hidden');
  document.getElementById('result-area').classList.add('hidden');
  document.getElementById('error-area').classList.add('hidden');
  document.getElementById('upload-area').classList.remove('hidden');
  fileInput.value = '';
}

function esc(s) { return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
